<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="planetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6a11cb" />
      <stop offset="100%" stop-color="#2575fc" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(128, 128) rotate(-20)">
    <ellipse cx="0" cy="0" rx="100" ry="25" fill="none" stroke="#ff9a9e" stroke-width="12" opacity="0.6" />
    <circle cx="0" cy="0" r="60" fill="url(#planetGrad)" filter="url(#glow)" />
    <path d="M -98,0 A 100,25 0 0,0 98,0" fill="none" stroke="#ff9a9e" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>